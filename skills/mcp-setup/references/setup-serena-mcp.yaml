# yaml-language-server: $schema=./setup-mcp.schema.json

# Serena MCP Server Setup - AI-Focused Configuration
# Compressed format for AI agent execution

name: "Setup Serena MCP Server"

objective: |
  Configure Serena MCP server to provide powerful IDE-like semantic code retrieval and editing
  capabilities to AI agents. Serena enables efficient symbol-level navigation, code structure
  understanding, and precise editing across 30+ programming languages through LSP integration.

prerequisites:
  - VS Code 1.99+
  - uv package manager installed (https://docs.astral.sh/uv/getting-started/installation/)
  - "For language-specific features: corresponding language servers or JetBrains plugin"

estimated_time: "2-3 minutes (Serena has no authentication required)"

server_definition:
  server_key: "serena"
  default_scope: "global"
  prerequisites: ["uvx"]
  mcp_config:
    command: "uvx"
    args:
      - "--from"
      - "git+https://github.com/oraios/serena"
      - "serena"
      - "start-mcp-server"

actions:
  - "Ask user to choose configuration scope: 'global' (user-wide, applies to all workspaces) or 'project' (workspace-specific, stored in .vscode/mcp.json and can be committed)"
  - "Run automated setup script with chosen scope: `uv run scripts/setup-mcp.py --server serena --scope [global|project]`"
  - "Wait for script completion - it will verify uv/uvx installation, create MCP config directory, and generate Serena configuration with project-based workflow support"
  - "Start MCP server: Open Command Palette (Ctrl+Shift+P / Cmd+Shift+P) → Run 'MCP: Open User Configuration' → Click 'Start' next to 'serena' server"
  - "Wait for server status to show 'Running' - Serena will initialize language servers on first use"
  - "Verify setup: Test with `@serena help` in Copilot Chat - should list available Serena tools like find_symbol, find_referencing_symbols, insert_after_symbol"
  - "For optimal experience, initialize Serena for your project: Navigate to your project directory → Run `@serena initialize_project` to create .serena configuration"

tools_used:
  - setup-mcp.py --server serena (unified setup script)
  - uvx (for running Serena from GitHub without installation)
  - VS Code Command Palette
  - VS Code MCP configuration panel

expected_outcome:
  - Serena MCP server configuration created in chosen scope location
  - MCP server status shows "Running" in VS Code
  - AI agent can use Serena's semantic code tools via @serena prefix
  - Language servers initialize automatically when working with supported languages
  - Test queries return symbol-level code information instead of file-level

validation:
  - "Run `uvx --version` to confirm uvx is installed (should be v0.4.0+)"
  - "Verify MCP config file exists at correct location (global: ~/.config/Code/User/globalStorage/mcp.json on Linux/macOS or %APPDATA%\\Code\\User\\globalStorage\\mcp.json on Windows; project: .vscode/mcp.json)"
  - "Check mcp.json contains 'serena' server entry with uvx command and git+https://github.com/oraios/serena URL"
  - "MCP configuration panel shows 'serena' server with 'Running' status"
  - "Test `@serena help` in Copilot Chat returns list of Serena tools (find_symbol, goto_definition, insert_after_symbol, etc.)"
  - "Test `@serena list_tools` shows available semantic code operations"

configuration:
  serena_project_config: |
    # Optional project-specific configuration in .serena/config.yaml
    # Serena auto-detects language servers, but you can customize:
    language_backend: "lsp"  # or "jetbrains" if using JetBrains plugin

    # Language-specific settings (example)
    lsp:
      python:
        enabled: true
      typescript:
        enabled: true

    # Logging and debugging
    log_level: "INFO"

usage_examples:
  - "@serena find_symbol MyClass - Find definition of MyClass in current project"
  - "@serena find_referencing_symbols calculate_total - Find all references to calculate_total function"
  - "@serena goto_definition UserService - Navigate to UserService definition"
  - "@serena list_symbols --type class - List all classes in current file"
  - "@serena insert_after_symbol MyClass 'def new_method(self): pass' - Add method after MyClass"
  - "@serena get_symbol_info handleClick - Get detailed information about handleClick symbol"
  - "@serena initialize_project - Set up Serena configuration for current project"

troubleshooting:
  - issue: "Command 'uvx' not found"
    cause: "uv package manager not installed or not in PATH"
    solution: "Install uv: `curl -LsSf https://astral.sh/uv/install.sh | sh` on Linux/macOS or `powershell -ExecutionPolicy ByPass -c 'irm https://astral.sh/uv/install.ps1 | iex'` on Windows. Restart terminal after installation."

  - issue: "MCP server shows 'Stopped' or 'Error' status"
    cause: "Serena failed to start or encountered error during initialization"
    solution: "Check VS Code Output panel → Select 'MCP: serena' from dropdown → Review error messages. Common causes: missing uv, network issues pulling from GitHub, or incompatible Python version. Try manually: `uvx --from git+https://github.com/oraios/serena serena start-mcp-server --help`"

  - issue: "Language server not working for specific language"
    cause: "Required language server not installed or not in PATH"
    solution: "Install language server for your language (e.g., Python: pyright, TypeScript: typescript-language-server, Rust: rust-analyzer). See https://oraios.github.io/serena/01-about/020_programming-languages.html for language-specific dependencies. Serena will auto-detect available language servers."

  - issue: "Serena tools return empty results or 'symbol not found'"
    cause: "Project not initialized or language server not ready"
    solution: "Ensure project has .serena directory: `@serena initialize_project`. Wait for language server to index codebase (check VS Code status bar for indexing progress). For large projects, initial indexing may take 30-60 seconds."

  - issue: "Performance degradation in large monorepos"
    cause: "Language server indexing entire workspace"
    solution: "Configure .serena/config.yaml to limit scope: set project_root to specific subdirectory, or use exclude_patterns to skip irrelevant directories (node_modules, build, dist, etc.)"

language_support:
  note: "Serena supports 30+ languages via LSP or JetBrains plugin"
  lsp_supported:
    - "Python (pyright, pylsp)"
    - "TypeScript/JavaScript (typescript-language-server)"
    - "Rust (rust-analyzer)"
    - "Go (gopls)"
    - "Java (jdtls)"
    - "C/C++ (clangd)"
    - "C# (omnisharp)"
    - "Ruby (solargraph)"
    - "PHP (intelephense)"
    - "And 20+ more languages"
  jetbrains_plugin: "For most robust experience, install Serena JetBrains Plugin (https://plugins.jetbrains.com/plugin/28946-serena/) which supports all JetBrains IDE languages"

resources:
  - name: "Serena GitHub Repository"
    url: "https://github.com/oraios/serena"
  - name: "Serena Documentation"
    url: "https://oraios.github.io/serena"
  - name: "User Guide"
    url: "https://oraios.github.io/serena/02-usage/000_intro.html"
  - name: "Language Support Details"
    url: "https://oraios.github.io/serena/01-about/020_programming-languages.html"
  - name: "Client Configuration"
    url: "https://oraios.github.io/serena/02-usage/030_clients.html"
  - name: "Serena JetBrains Plugin"
    url: "https://plugins.jetbrains.com/plugin/28946-serena/"
