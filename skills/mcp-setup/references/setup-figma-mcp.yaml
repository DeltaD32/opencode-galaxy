    url: "https://www.figma.com/developers/docs/mcp"
  - name: "VS Code MCP Configuration"
    url: "https://code.visualstudio.com/docs/copilot/copilot-extensibility-overview"
  - name: "GitHub Copilot Information (ATC)"
    url: "https://atc.bmwgroup.net/confluence/x/github-copilot"
  - name: "Figma Access and Teams"
    url: "https://ux.bmwgroup.net/figma"
  - name: "Frontend Dev Standards Angular Template"
    url: "https://atc.bmwgroup.net/confluence/x/frontend-dev-standards"
  - name: "Write Effective Prompts for Figma"
    url: "https://www.figma.com/developers/docs/mcp/best-practices/prompts"
  - name: "Code Connect Documentation"
    url: "https://www.figma.com/developers/docs/code-connect"
  - name: "Structure Figma Files for Better Code"
