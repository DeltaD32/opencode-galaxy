<script>
// Apply saved theme immediately to prevent flash of wrong theme
(function(){let t;try{t=localStorage.getItem('theme')}catch(e){}t=t||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();
</script>
<header class="site-header">
  <div class="container">
    <a href="{{basePath}}/" class="header-brand">
      <img src="{{basePath}}/assets/bmw-logo.svg" alt="{{site.organization}}" width="36" height="36">
      <div class="header-brand-text">
        {{site.name}}
        <span>{{site.subtitle}}</span>
      </div>
    </a>
    <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav" aria-label="Toggle navigation" onclick="const nav=document.getElementById('main-nav');nav.classList.toggle('open');this.setAttribute('aria-expanded',nav.classList.contains('open'))">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <nav id="main-nav" class="header-nav" role="navigation" aria-label="Main navigation">
      {{#navPages}}
      <a href="{{basePath}}/{{output}}" class="{{#active}}active{{/active}}">{{title}}</a>
      {{/navPages}}
    </nav>
    <div class="header-actions">
      {{#repo.url}}
      <a href="{{repo.url}}" class="btn btn--ghost btn--sm" target="_blank" rel="noopener noreferrer">GitHub</a>
      {{/repo.url}}
      <button class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode" onclick="toggleTheme()">
        <svg class="theme-toggle__icon--light" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
        </svg>
        <svg class="theme-toggle__icon--dark" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
        </svg>
      </button>
    </div>
  </div>
</header>
<script>
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('theme', next); } catch (e) { /* private browsing */ }
  const btn = document.getElementById('theme-toggle');
  btn.setAttribute('aria-label', next === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
}
// Set initial aria-label based on current theme
(function() {
  const theme = document.documentElement.getAttribute('data-theme');
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
})();
</script>
