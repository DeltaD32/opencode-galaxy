# config/autonomy.toml — JARVIS self-extension autonomy policy (Module F)
#
# Hot-reloadable. Controls how autonomously the Architect creates/changes agents & skills.
#
# IMPORTANT: the "immutable floor" (Module F.4) is enforced in CODE, not here.
# Any setting in this file that tries to loosen a code-locked class is IGNORED.
# Editing this file CANNOT disarm the sandbox, egress, verification, or rollback.

[general]
# Max autonomous generate -> verify -> repair iterations before escalating to you.
# Higher = more "clean on first try" feel, more tokens. 3-5 is the sweet spot.
max_repair_attempts = 4

# Where unconverged failures + notices surface: "galaxy" (amber) | "log" | "voice".
escalation_channel = "galaxy"

# After an autonomous apply: "notify" (tell you) | "silent".
post_apply = "notify"

# Versions kept per agent/skill for instant rollback.
versions_retained = 10


# ── Verification gate (this REPLACES the human gate). All enabled checks must pass. ──
[verification]
typecheck        = true    # lint/typecheck generated code
unit_tests       = true    # skills must ship + pass unit tests (run in sandbox)
eval_harness     = true    # no regression vs the eval suite (Module D)
invariant_check  = true    # list_invariants() assertions must hold
sandbox_dryrun   = true    # execute the new capability once in the sandbox
eval_min_pass_rate = 1.0   # 1.0 = no regressions allowed before apply


# ── Autonomy dial per change class: "auto" | "notify" | "gate" ──
#   auto   = verify -> apply, no human (you're told per [general].post_apply)
#   notify = same as auto but always pings you
#   gate   = requires your explicit approval first
[modes]
create_agent       = "auto"     # new specialist from template
create_skill       = "auto"     # new skill with passing tests + evals
edit_agent_prompt  = "auto"
edit_agent_tools   = "notify"   # changing a tool allowlist is worth a heads-up
edit_routing       = "auto"
retire_agent       = "notify"
retire_skill       = "notify"


# ── CODE-LOCKED classes (Module F.4 immutable floor) ──
# Listed for transparency. Enforced in code REGARDLESS of values here.
# Setting any of these to "auto" has NO effect.
[modes.locked]
widen_egress_allowlist    = "denied"   # never, by any path
weaken_sandbox            = "denied"
weaken_file_scope_policy  = "denied"
disable_verification_gate = "denied"
disable_auto_rollback     = "denied"
edit_control_plane        = "gate"     # scheduler/lease/governance code -> you only
edit_governance_gate      = "gate"
edit_autonomy_floor       = "gate"     # this locked section itself


[rollback]
auto_revert_on_error = true     # revert a change if it misbehaves after apply
watch_window_minutes = 30       # how long a fresh change is watched
error_threshold      = 3        # this many errors -> auto-revert to prior version
