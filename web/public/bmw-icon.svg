<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Deep space background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2035"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </radialGradient>
    <!-- Core node glow -->
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5b9cf6" stop-opacity="1"/>
      <stop offset="60%" stop-color="#1c69d4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0653b6" stop-opacity="0"/>
    </radialGradient>
    <!-- Orbit ring gradient -->
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c69d4" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#5b9cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1c69d4" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Satellite node glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="core-filter" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Outer orbit ring — ellipse tilted ~30deg -->
  <ellipse cx="32" cy="32" rx="22" ry="9" fill="none"
    stroke="url(#ring1)" stroke-width="0.8" opacity="0.7"
    transform="rotate(-30 32 32)"/>

  <!-- Second orbit ring — perpendicular tilt -->
  <ellipse cx="32" cy="32" rx="22" ry="9" fill="none"
    stroke="url(#ring1)" stroke-width="0.5" opacity="0.35"
    transform="rotate(60 32 32)"/>

  <!-- Connection lines to satellite nodes -->
  <line x1="32" y1="32" x2="52" y2="22" stroke="#1c69d4" stroke-width="0.6" opacity="0.5"/>
  <line x1="32" y1="32" x2="14" y2="44" stroke="#1c69d4" stroke-width="0.6" opacity="0.5"/>
  <line x1="32" y1="32" x2="46" y2="50" stroke="#5b9cf6" stroke-width="0.6" opacity="0.35"/>
  <line x1="32" y1="32" x2="16" y2="18" stroke="#5b9cf6" stroke-width="0.6" opacity="0.35"/>

  <!-- Core node glow halo -->
  <circle cx="32" cy="32" r="10" fill="url(#core-glow)" opacity="0.5"/>

  <!-- Core node -->
  <circle cx="32" cy="32" r="5.5" fill="#1c69d4" filter="url(#core-filter)"/>
  <circle cx="32" cy="32" r="3.5" fill="#5b9cf6"/>
  <circle cx="32" cy="32" r="1.8" fill="#e8f0ff"/>

  <!-- Satellite nodes -->
  <circle cx="52" cy="22" r="2.2" fill="#1c69d4" filter="url(#glow)"/>
  <circle cx="52" cy="22" r="1.2" fill="#5b9cf6"/>

  <circle cx="14" cy="44" r="2.2" fill="#1c69d4" filter="url(#glow)"/>
  <circle cx="14" cy="44" r="1.2" fill="#5b9cf6"/>

  <circle cx="46" cy="50" r="1.6" fill="#0e4fa8" filter="url(#glow)"/>
  <circle cx="46" cy="50" r="0.9" fill="#3a7fd4"/>

  <circle cx="16" cy="18" r="1.6" fill="#0e4fa8" filter="url(#glow)"/>
  <circle cx="16" cy="18" r="0.9" fill="#3a7fd4"/>

  <!-- Tiny stars / dust particles -->
  <circle cx="42" cy="13" r="0.6" fill="#5b9cf6" opacity="0.6"/>
  <circle cx="56" cy="38" r="0.5" fill="#5b9cf6" opacity="0.4"/>
  <circle cx="8"  cy="30" r="0.5" fill="#5b9cf6" opacity="0.4"/>
  <circle cx="22" cy="56" r="0.6" fill="#5b9cf6" opacity="0.5"/>
  <circle cx="58" cy="14" r="0.4" fill="#9bbff5" opacity="0.5"/>
  <circle cx="6"  cy="52" r="0.4" fill="#9bbff5" opacity="0.4"/>
</svg>
